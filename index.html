<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maker3D Shop</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
    
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body>

    <header class="header-principal">
        <div class="logo-container">
            <img src="assets/brand/logo.png" alt="Maker3D Shop" class="logo-img" style="max-width: 150px; max-height: 80px;">
        </div>
        <nav class="menu-navegacao">
            <a href="index.html" class="ativo">Início</a>
            <a href="catalogo.html">Catálogo</a>
            <a href="calculadora.html">Orçamento</a>
            <a href="contato.html">Contato</a>
        </nav>
    </header>

    <main class="container-principal">
        <h1 class="titulo-secao">Nossas Criações</h1>
        <p class="subtitulo-secao">Toque no produto para descobrir os detalhes.</p>
        
        <div id="grid-produtos" class="grid-produtos">
            <p>Carregando vitrine...</p>
        </div>
    </main>

    <div id="modal-produto" class="modal-overlay">
        <div class="modal-conteudo">
            <button id="btn-fechar-modal" class="btn-fechar">&times;</button>
            
            <div class="carrossel-midia" id="modal-carrossel">
                </div>

            <div class="info-produto">
                <h2 id="modal-titulo">Nome do Produto</h2>
                <p id="modal-descricao">Descrição do produto vai aqui.</p>
                
                <div class="preco-destaque" id="modal-preco">R$ 0,00</div>
            </div>

            <div class="area-compra">
                <button id="btn-comprar" class="btn-comprar-whatsapp">COMPRAR AGORA</button>
            </div>
        </div>
    </div>

    <script src="assets/app.js"></script>
</body>
</html>
