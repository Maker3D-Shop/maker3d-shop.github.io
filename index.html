<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maker3D Shop | Design & Inovação</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="assets/style.css">
    
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body>

    <header class="main-header">
        <div class="logo-container">
            <img src="assets/brand/logo.png" alt="Maker3D Logo" class="logo">
        </div>
        <nav class="nav-menu">
            <a href="index.html">Início</a>
            <a href="catalogo.html">Catálogo</a>
            <a href="calculadora.html">Orçamento</a>
        </nav>
    </header>

    <main>
        <section class="hero-highlight" onclick="location.href='catalogo.html'">
            <div class="hero-content">
                <span>NOVA COLEÇÃO</span>
                <h1>A Arte da Impressão 3D</h1>
                <p>Deslize para explorar a exclusividade.</p>
            </div>
        </section>

        <section class="product-grid" id="productGrid">
            <div class="skeleton-loader"></div>
            <div class="skeleton-loader"></div>
        </section>
    </main>

    <div id="productModal" class="modal-overlay">
        <div class="modal-container">
            <button class="close-modal" onclick="closeProduct()">&times;</button>
            
            <div class="modal-body">
                <div class="product-visuals" id="modalVisuals">
                    </div>

                <div class="product-info">
                    <h2 id="modalTitle">Nome do Produto</h2>
                    <p id="modalDescription">Descrição detalhada...</p>
                    
                    <div class="price-tag" id="modalPrice"></div>
                    
                    <button class="btn-buy" id="btnBuy">ENCOMENDAR VIA WHATSAPP</button>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/app.js"></script>
</body>
</html>
